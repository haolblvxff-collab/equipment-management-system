<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">
<title>设备管理与巡检系统 — Fab A</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f6fa;--card:#fff;--border:#e8ecf1;--text:#1a1a2e;--dim:#6b7280;--red:#e74c3c;--orange:#f39c12;--green:#27ae60;--blue:#3498db;--purple:#8e44ad;--cyan:#17a2b8;--sidebar-bg:#1e2a3a;--sidebar-text:#b0bec5;--sidebar-active:#3498db;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar-bg);color:var(--sidebar-text);padding:0;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sidebar .logo{padding:20px 16px;font-size:1.1rem;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
.sidebar .logo span{font-size:.7rem;color:var(--sidebar-text);font-weight:400}
.sidebar nav{flex:1;padding:8px 0}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:.85rem;transition:.15s;border-left:3px solid transparent;color:var(--sidebar-text)}
.sidebar .nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sidebar .nav-item.active{background:rgba(52,152,219,.15);color:var(--sidebar-active);border-left-color:var(--sidebar-active);font-weight:600}
.sidebar .nav-section{padding:8px 20px 4px;font-size:.7rem;color:rgba(176,190,197,.5);text-transform:uppercase;letter-spacing:1px}
.main{margin-left:220px;flex:1;padding:20px;min-width:0}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.header h1{font-size:1.3rem}.header .user{font-size:.8rem;color:var(--dim)}
.page{display:none}.page.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi .lbl{font-size:.7rem;color:var(--dim);margin-bottom:3px}
.kpi .val{font-size:1.5rem;font-weight:700}.kpi .sub{font-size:.65rem;color:var(--dim)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h3{font-size:.9rem;margin-bottom:10px}
.card canvas{max-height:300px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#f8f9fb;color:var(--dim);padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border)}tr:hover td{background:rgba(52,152,219,.03)}
.badge{padding:3px 9px;border-radius:12px;font-size:.68rem;font-weight:600;display:inline-block}
.badge-red{background:#fde8e8;color:var(--red)}.badge-orange{background:#fef3e0;color:var(--orange)}.badge-green{background:#e8f8ef;color:var(--green)}.badge-blue{background:#e8f0fe;color:var(--blue)}.badge-purple{background:#f0e8f8;color:var(--purple)}.badge-cyan{background:#e8f8f8;color:var(--cyan)}
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#2980b9}
.btn-outline{background:#fff;color:var(--blue);border:1px solid var(--blue)}.btn-outline:hover{background:#e8f0fe}
.btn-danger{background:var(--red);color:#fff}.btn-sm{padding:4px 10px;font-size:.7rem}
.actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.actions input,.actions select{padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;background:#fff}
.actions input:focus,.actions select:focus{outline:none;border-color:var(--blue)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:620px;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.modal h3{margin-bottom:16px;font-size:1.1rem}
.modal .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.modal .form-row.full{grid-template-columns:1fr}
.modal label{font-size:.78rem;color:var(--dim);display:block;margin-bottom:3px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:.82rem}
.modal textarea{min-height:70px;resize:vertical}
.modal .form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.kanban-col{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px;min-height:150px}
.kanban-col h4{font-size:.78rem;color:var(--dim);margin-bottom:8px;text-align:center;padding-bottom:6px;border-bottom:1px solid var(--border)}
.kanban-item{background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;font-size:.72rem;cursor:pointer;transition:.15s}
.kanban-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}.kanban-item .wo-id{font-family:monospace;font-size:.65rem;color:var(--blue)}
.status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.status-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;border-left:4px solid var(--border);cursor:pointer}
.status-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}.status-card .m-name{font-weight:700;font-size:.95rem}
.scroll-table{max-height:450px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius)}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:12px}
.inspection-form .check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.inspection-form .check-item .item-name{flex:1;font-size:.85rem}
.inspection-form .check-item input{width:100px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:.8rem}
.inspection-form .check-item select{padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:.8rem}
.qr-code{display:inline-block;padding:4px 10px;background:#1a1a2e;color:#0f0;font-family:monospace;font-size:.7rem;border-radius:4px;letter-spacing:1px}
@media(max-width:768px){.sidebar{width:60px}.sidebar .nav-item{justify-content:center;padding:12px 0}.sidebar .nav-item span:last-child,.sidebar .logo span,.sidebar .nav-section{display:none}.main{margin-left:60px}.kanban{grid-template-columns:1fr}.modal .form-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">🔧 设备管理<span>v4.0</span></div>
  <nav>
    <div class="nav-section">工作台</div>
    <div class="nav-item active" onclick="navTo('workbench')">📊 首页看板</div>
    <div class="nav-section">业务管理</div>
    <div class="nav-item" onclick="navTo('archive')">📋 设备档案</div>
    <div class="nav-item" onclick="navTo('inspection')">🔍 设备巡检</div>
    <div class="nav-item" onclick="navTo('repair')">🔧 报修维修</div>
    <div class="nav-item" onclick="navTo('pm')">🛡️ 维护保养</div>
    <div class="nav-item" onclick="navTo('spareparts')">📦 备件管理</div>
    <div class="nav-section">数据分析</div>
    <div class="nav-item" onclick="navTo('stats')">📈 统计分析</div>
    <div class="nav-section">系统设置</div>
    <div class="nav-item" onclick="navTo('settings')">⚙️ 配置中心</div>
  </nav>
  <div style="padding:16px;font-size:.7rem;color:var(--sidebar-text);text-align:center;border-top:1px solid rgba(255,255,255,.1)">Fab A · 2024</div>
</div>

<!-- Main Content -->
<div class="main">
  <div class="header">
    <div><h1 id="pageTitle">📊 首页看板</h1></div>
    <div class="user">👤 管理员 · <span id="clock2"></span></div>
  </div>

  <!-- PAGE: 首页看板 -->
  <div class="page active" id="pg-workbench">
    <div class="kpi-grid" id="wbKPIs"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card"><h3>🔴 待处理工单</h3><div class="scroll-table" style="max-height:300px"><table id="wbWO"></table></div></div>
      <div class="card"><h3>📅 本周保养</h3><div class="scroll-table" style="max-height:300px"><table id="wbPM"></table></div></div>
      <div class="card" style="grid-column:1/-1"><h3>⚠️ 库存预警</h3><table id="wbSP"></table></div>
    </div>
  </div>

  <!-- PAGE: 设备档案 -->
  <div class="page" id="pg-archive">
    <div class="actions">
      <button class="btn btn-primary" onclick="showModal('archive')">＋ 新增设备</button>
      <input type="text" placeholder="🔍 搜索设备..." oninput="renderArchive()" id="archSearch">
      <select onchange="renderArchive()" id="archStatus"><option value="">全部状态</option><option>正常运行</option><option>注意</option><option>维修中</option></select>
      <button class="btn btn-outline btn-sm" onclick="renderArchive()">🔄 刷新</button>
    </div>
    <div class="scroll-table"><table><thead><tr><th>设备编号</th><th>名称</th><th>类型</th><th>位置</th><th>状态</th><th>负责人</th><th>二维码</th><th>操作</th></tr></thead><tbody id="archBody"></tbody></table></div>
  </div>

  <!-- PAGE: 设备巡检 -->
  <div class="page" id="pg-inspection">
    <div class="actions">
      <button class="btn btn-primary" onclick="showInspectionForm()">📝 发起巡检</button>
      <select onchange="renderInspRecords()" id="inspMach"><option value="">全部机台</option></select>
      <select onchange="renderInspRecords()" id="inspTypeF"><option value="">全部类型</option><option>日检</option><option>周检</option><option>月检</option></select>
    </div>
    <div id="inspectionForm" class="card" style="display:none"></div>
    <div class="scroll-table"><table><thead><tr><th>编号</th><th>机台</th><th>类型</th><th>日期</th><th>检查人</th><th>结果</th><th>操作</th></tr></thead><tbody id="inspBody"></tbody></table></div>
  </div>

  <!-- PAGE: 报修维修 -->
  <div class="page" id="pg-repair">
    <div class="actions">
      <button class="btn btn-danger" onclick="showModal('repair')">📝 新建报修单</button>
      <input type="text" placeholder="🔍 搜索..." oninput="renderWO()" id="woSearch">
    </div>
    <div class="kanban" id="woKanban"></div>
    <div class="card" style="margin-top:10px"><h3>工单列表</h3><div class="scroll-table"><table><thead><tr><th>工单号</th><th>机台</th><th>类别</th><th>阶段</th><th>报修人</th><th>派单人</th><th>维修人</th><th>耗时</th><th>操作</th></tr></thead><tbody id="woBody"></tbody></table></div></div>
  </div>

  <!-- PAGE: 维护保养 -->
  <div class="page" id="pg-pm">
    <div class="actions"><button class="btn btn-primary" onclick="showModal('pm')">＋ 新建保养计划</button></div>
    <div class="scroll-table"><table><thead><tr><th>机台</th><th>类型</th><th>周期</th><th>上次保养</th><th>下次保养</th><th>负责人</th><th>状态</th></tr></thead><tbody id="pmBody"></tbody></table></div>
  </div>

  <!-- PAGE: 备件管理 -->
  <div class="page" id="pg-spareparts">
    <div class="kpi-grid" id="spKPIs"></div>
    <div class="actions">
      <button class="btn btn-primary" onclick="showModal('inbound')">📥 入库</button>
      <button class="btn btn-outline" onclick="showModal('outbound')">📤 领用</button>
    </div>
    <div class="scroll-table"><table><thead><tr><th>备件编号</th><th>名称</th><th>类别</th><th>库存</th><th>安全库存</th><th>单价(¥)</th><th>供应商</th><th>库位</th><th>状态</th></tr></thead><tbody id="spBody"></tbody></table></div>
  </div>

  <!-- PAGE: 统计分析 -->
  <div class="page" id="pg-stats"><div class="chart-grid" id="statsCharts"></div></div>

  <!-- PAGE: 配置中心 -->
  <div class="page" id="pg-settings"><div class="card"><h3>⚙️ 巡检标准配置</h3><div id="settingsInsp"></div></div></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalBox" onclick="event.stopPropagation()"></div>
</div>

<script>
const DATA = __FULL_DATA__;
const ANOMALY = __ANOMALY_DATA__;

setInterval(()=>document.getElementById('clock2').textContent=new Date().toLocaleString('zh-CN'),1000);

// Navigation
function navTo(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById('pg-'+page);if(pg)pg.classList.add('active');
  const titles={workbench:'📊 首页看板',archive:'📋 设备档案',inspection:'🔍 设备巡检',repair:'🔧 报修维修',pm:'🛡️ 维护保养',spareparts:'📦 备件管理',stats:'📈 统计分析',settings:'⚙️ 配置中心'};
  document.getElementById('pageTitle').textContent=titles[page]||'';
  if(page==='workbench')renderWorkbench();
  if(page==='archive')renderArchive();
  if(page==='inspection')renderInspection();
  if(page==='repair')renderRepair();
  if(page==='pm')renderPM();
  if(page==='spareparts')renderSP();
  if(page==='stats')renderStats();
  if(page==='settings')renderSettings();
}

// ===== WORKBENCH =====
function renderWorkbench(){
  const eq=DATA.equipment_archive,wos=DATA.work_orders,sp=DATA.spare_parts_inventory,pm=DATA.pm_plans;
  const pending=wos.filter(w=>w.stage!=='已完成'),critical=sp.filter(s=>s.current<s.safety_stock),thisWeek=pm.filter(p=>p.status==='本周');
  document.getElementById('wbKPIs').innerHTML=`
    <div class="kpi"><div class="lbl">📋 设备总数</div><div class="val">${eq.length}</div></div>
    <div class="kpi" style="border-left:3px solid var(--red)"><div class="lbl">🔴 待处理工单</div><div class="val" style="color:var(--red)">${pending.length}</div></div>
    <div class="kpi" style="border-left:3px solid var(--orange)"><div class="lbl">⚠️ 库存预警</div><div class="val" style="color:var(--orange)">${critical.length}</div></div>
    <div class="kpi" style="border-left:3px solid var(--blue)"><div class="lbl">📅 本周保养</div><div class="val" style="color:var(--blue)">${thisWeek.length}</div></div>
    <div class="kpi"><div class="lbl">🔧 维修中</div><div class="val">${wos.filter(w=>w.stage==='维修中').length}</div></div>`;
  document.getElementById('wbWO').innerHTML=`<tr><th>工单号</th><th>机台</th><th>阶段</th><th>描述</th></tr>${pending.slice(0,8).map(w=>`<tr><td style="font-family:monospace;font-size:.7rem">${w.id}</td><td><strong>${w.machine}</strong></td><td><span class="badge ${w.stage==='待派单'?'badge-red':w.stage==='维修中'?'badge-purple':'badge-orange'}">${w.stage}</span></td><td style="font-size:.72rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${w.description?.slice(0,25)}</td></tr>`).join('')}`;
  document.getElementById('wbPM').innerHTML=`<tr><th>机台</th><th>日期</th><th>负责人</th></tr>${pm.filter(p=>p.status==='本周').slice(0,8).map(p=>`<tr><td><strong>${p.machine}</strong></td><td>${p.next_date}</td><td>${p.assignee}</td></tr>`).join('')}`;
  document.getElementById('wbSP').innerHTML=`<tr><th>备件</th><th>库存</th><th>安全库存</th><th>供应商</th><th>状态</th></tr>${critical.map(s=>`<tr><td><strong>${s.name}</strong></td><td style="color:var(--red);font-weight:700">${s.current}</td><td>${s.safety_stock}</td><td>${s.supplier}</td><td><span class="badge ${s.current===0?'badge-red':'badge-orange'}">${s.current===0?'🔴缺货':'⚠️低库存'}</span></td></tr>`).join('')}`;
}

// ===== ARCHIVE =====
function renderArchive(){
  const eq=DATA.equipment_archive,s=(document.getElementById('archSearch')?.value||'').toLowerCase(),sf=(document.getElementById('archStatus')?.value||'');
  let data=eq.filter(e=>(!s||e.name.toLowerCase().includes(s)||e.type.includes(s))&&(!sf||e.status===sf));
  document.getElementById('archBody').innerHTML=data.map(e=>`<tr>
    <td style="font-family:monospace;font-size:.7rem">${e.id}</td><td><strong>${e.name}</strong></td><td>${e.type}</td><td>${e.location}</td>
    <td><span class="badge ${e.status==='正常运行'?'badge-green':e.status==='注意'?'badge-orange':'badge-red'}">${e.status}</span></td>
    <td>${e.responsible}</td><td><span class="qr-code">${e.qr_code}</span></td>
    <td><button class="btn btn-outline btn-sm" onclick="showEQDetail('${e.id}')">详情</button></td></tr>`).join('');
}

// ===== INSPECTION =====
let inspRecords=[];
function renderInspection(){
  const eq=DATA.equipment_archive;
  document.getElementById('inspMach').innerHTML='<option value="">全部机台</option>'+eq.map(e=>`<option>${e.name}</option>`).join('');
  // Generate demo records
  if(!inspRecords.length){for(let i=0;i<30;i++){const e=eq[Math.floor(Math.random()*eq.length)];inspRecords.push({id:'INS-'+String(i+1).padStart(4,'0'),machine:e.name,type:['日检','周检','月检'][i%3],date:`2024-${11+Math.floor(i/15)}-${String(1+(i*3)%28).padStart(2,'0')}`,inspector:['张工','李工','王工'][i%3],result:Math.random()<.2?'异常':'正常',items:[{item:'外观检查',result:'正常'},{item:'运行参数',result:Math.random()<.1?'异常':'正常'}]});}}
  renderInspRecords();
}
function renderInspRecords(){
  const mf=(document.getElementById('inspMach')?.value||''),tf=(document.getElementById('inspTypeF')?.value||'');
  let data=inspRecords.filter(r=>(!mf||r.machine===mf)&&(!tf||r.type===tf));
  document.getElementById('inspBody').innerHTML=data.map(r=>`<tr>
    <td style="font-family:monospace;font-size:.7rem">${r.id}</td><td><strong>${r.machine}</strong></td><td>${r.type}</td><td>${r.date}</td><td>${r.inspector}</td>
    <td><span class="badge ${r.result==='正常'?'badge-green':'badge-red'}">${r.result}</span></td>
    <td>${r.result==='异常'?`<button class="btn btn-danger btn-sm" onclick="quickRepair('${r.machine}')">→ 报修</button>`:'<button class="btn btn-outline btn-sm" onclick="viewInspDetail('${r.id}')">查看</button>'}</td></tr>`).join('');
}
function showInspectionForm(){
  const eq=DATA.equipment_archive;
  let opts=eq.map(e=>`<option>${e.name} - ${e.type}</option>`).join('');
  document.getElementById('inspectionForm').style.display='block';
  document.getElementById('inspectionForm').innerHTML=`
    <h3>📝 发起设备巡检</h3>
    <div class="form-row"><div><label>选择设备</label><select id="inspEQSelect">${opts}</select></div><div><label>巡检类型</label><select id="inspTypeSelect"><option>日检</option><option>周检</option><option>月检</option></select></div></div>
    <div id="inspCheckItems" style="margin:12px 0"></div>
    <div class="form-actions"><button class="btn btn-outline" onclick="document.getElementById('inspectionForm').style.display='none'">取消</button><button class="btn btn-primary" onclick="submitInspection()">✅ 提交巡检</button></div>`;
  document.getElementById('inspEQSelect').onchange=updateInspItems;
  document.getElementById('inspTypeSelect').onchange=updateInspItems;
  updateInspItems();
}
function updateInspItems(){
  const sel=document.getElementById('inspEQSelect')?.value||'',type=document.getElementById('inspTypeSelect')?.value||'日检';
  const tname=sel.split(' - ')[1]||'';
  const std=DATA.inspection_standards?.[tname]?.[type]||[{item:'外观检查',method:'目视',standard:'正常',unit:''}];
  document.getElementById('inspCheckItems').innerHTML=std.map((s,i)=>`
    <div class="check-item"><span class="item-name">${s.item}</span><span style="font-size:.75rem;color:var(--dim)">方法:${s.method} 标准:${s.standard}${s.unit}</span>
    <select id="inspItem${i}"><option>正常</option><option>异常</option><option>待观察</option></select>
    <input type="text" id="inspVal${i}" placeholder="实测值" style="width:80px"></div>`).join('');
}
function submitInspection(){
  const mach=(document.getElementById('inspEQSelect')?.value||'').split(' - ')[0];
  const type=document.getElementById('inspTypeSelect')?.value||'';
  const items=[];let allNormal=true;
  document.querySelectorAll('#inspCheckItems .check-item').forEach((el,i)=>{
    const r=document.getElementById('inspItem'+i)?.value||'正常';if(r!=='正常')allNormal=false;
    items.push({item:el.querySelector('.item-name')?.textContent||'',result:r});
  });
  inspRecords.unshift({id:'INS-'+String(inspRecords.length+1).padStart(4,'0'),machine:mach,type,date:new Date().toISOString().slice(0,10),inspector:'当前用户',result:allNormal?'正常':'异常',items});
  document.getElementById('inspectionForm').style.display='none';
  renderInspRecords();
  if(!allNormal)quickRepair(mach);
}

// ===== REPAIR =====
function renderRepair(){
  const wos=DATA.work_orders,stages=['待派单','已派单','维修中','待验收','已完成'],sc=['badge-red','badge-orange','badge-purple','badge-cyan','badge-green'];
  document.getElementById('woKanban').innerHTML=stages.map((s,i)=>`<div class="kanban-col"><h4>${s} (${wos.filter(w=>w.stage===s).length})</h4>${wos.filter(w=>w.stage===s).slice(0,6).map(w=>`<div class="kanban-item" onclick="changeWOStage('${w.id}')"><div class="wo-id">${w.id}</div><div><strong>${w.machine}</strong> <span class="badge ${sc[i]}">${w.category}</span></div><div style="font-size:.65rem;color:var(--dim)">${w.description?.slice(0,20)}</div></div>`).join('')}</div>`).join('');
  renderWO();
}
function renderWO(){
  const wos=DATA.work_orders,s=(document.getElementById('woSearch')?.value||'').toLowerCase();
  let data=wos.filter(w=>!s||w.machine.toLowerCase().includes(s)||w.description.toLowerCase().includes(s));
  document.getElementById('woBody').innerHTML=data.slice(0,80).map(w=>`<tr>
    <td style="font-family:monospace;font-size:.7rem">${w.id}</td><td><strong>${w.machine}</strong></td><td><span class="badge badge-blue">${w.category}</span></td>
    <td><span class="badge ${w.stage==='已完成'?'badge-green':w.stage==='待派单'?'badge-red':w.stage==='维修中'?'badge-purple':'badge-orange'}">${w.stage}</span></td>
    <td>${w.reporter}</td><td>${w.dispatcher||'-'}</td><td>${w.handler||'-'}</td><td>${w.duration}h</td>
    <td><button class="btn btn-outline btn-sm" onclick="changeWOStage('${w.id}')">流转</button></td></tr>`).join('');
}
function changeWOStage(woId){
  const wo=DATA.work_orders.find(w=>w.id===woId);if(!wo)return;
  const stages=['待派单','已派单','维修中','待验收','已完成'],ci=stages.indexOf(wo.stage);
  const next=(ci+1)%5;
  if(confirm(`将工单 ${woId} 从「${wo.stage}」流转到「${stages[next]}」？`)){
    wo.stage=stages[next];
    if(wo.stage==='已派单')wo.dispatcher='王主管';
    if(wo.stage==='维修中')wo.handler=wo.handler||'张工';
    renderRepair();renderWorkbench();
  }
}
function quickRepair(mach){
  document.getElementById('modalOverlay').style.display='flex';
  document.getElementById('modalBox').innerHTML=`<h3>🔧 快速报修 - ${mach}</h3>
    <div class="form-row full"><div><label>故障类别</label><select id="qrCat"><option>设备装置异常</option><option>工艺条件异常</option><option>软件异常</option><option>耗材消耗</option><option>其他</option></select></div></div>
    <div class="form-row full"><div><label>故障描述</label><textarea id="qrDesc" placeholder="请描述故障现象..."></textarea></div></div>
    <div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="submitQuickRepair('${mach}')">提交报修</button></div>`;
}
function submitQuickRepair(mach){
  const wo={id:'WO-2024-'+String(DATA.work_orders.length+1).padStart(4,'0'),machine:mach,category:document.getElementById('qrCat')?.value||'',description:document.getElementById('qrDesc')?.value||'',start_time:new Date().toISOString().slice(0,16),reporter:'巡检员',dispatcher:'',handler:'',stage:'待派单',duration:'0',solution:''};
  DATA.work_orders.unshift(wo);closeModal();renderRepair();renderWorkbench();
}

// ===== PM =====
function renderPM(){
  document.getElementById('pmBody').innerHTML=DATA.pm_plans.map(p=>`<tr><td><strong>${p.machine}</strong></td><td>${p.type}</td><td>${p.interval_days}天</td><td>${p.last_date}</td><td>${p.next_date}</td><td>${p.assignee}</td><td><span class="badge ${p.status==='本周'?'badge-orange':'badge-green'}">${p.status}</span></td></tr>`).join('');
}

// ===== SPARE PARTS =====
function renderSP(){
  const sp=DATA.spare_parts_inventory,crit=sp.filter(s=>s.current<s.safety_stock);
  document.getElementById('spKPIs').innerHTML=`<div class="kpi"><div class="lbl">📦 种类</div><div class="val">${sp.length}</div></div><div class="kpi" style="border-left:3px solid var(--red)"><div class="lbl">🔴 缺货</div><div class="val" style="color:var(--red)">${sp.filter(s=>s.current===0).length}</div></div><div class="kpi" style="border-left:3px solid var(--orange)"><div class="lbl">⚠️ 低库存</div><div class="val" style="color:var(--orange)">${crit.filter(s=>s.current>0).length}</div></div>`;
  document.getElementById('spBody').innerHTML=sp.map(s=>`<tr><td style="font-family:monospace;font-size:.7rem">${s.id}</td><td><strong>${s.name}</strong></td><td><span class="badge ${s.category==='关键备件'?'badge-red':'badge-blue'}">${s.category}</span></td><td style="font-weight:700;color:${s.current<s.safety_stock?'var(--red)':'var(--green)'}">${s.current} ${s.unit}</td><td>${s.safety_stock}</td><td>¥${s.price.toLocaleString()}</td><td>${s.supplier}</td><td>${s.location}</td><td><span class="badge ${s.current===0?'badge-red':s.current<s.safety_stock?'badge-orange':'badge-green'}">${s.current===0?'🔴缺货':s.current<s.safety_stock?'⚠️低库存':'✅正常'}</span></td></tr>`).join('');
}

// ===== STATS =====
let _statsDone=false;
function renderStats(){
  if(_statsDone)return;_statsDone=true;
  if(!ANOMALY.categories)return;
  const a=ANOMALY,colors=['#e74c3c','#f39c12','#3498db','#27ae60','#8e44ad','#e84393','#17a2b8','#fdcb6e'];
  document.getElementById('statsCharts').innerHTML=`
    <div class="card"><h3>📈 月度异常趋势</h3><canvas id="cMonthly"></canvas></div>
    <div class="card"><h3>🍩 类别分布</h3><canvas id="cCategory"></canvas></div>
    <div class="card"><h3>🔝 高故障机台</h3><canvas id="cMachines"></canvas></div>
    <div class="card"><h3>📊 Pareto分析</h3><canvas id="cPareto"></canvas></div>`;
  setTimeout(()=>{
    const topCats=Object.keys(a.categories||{}).slice(0,6);
    new Chart(document.getElementById('cMonthly'),{type:'bar',data:{labels:a.monthly_trend?.labels||[],datasets:topCats.map((c,i)=>({label:c,data:a.monthly_trend?.categories?.[c]||[],backgroundColor:colors[i]}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{stacked:true},y:{stacked:true}}}});
    const ce=Object.entries(a.categories||{});
    new Chart(document.getElementById('cCategory'),{type:'doughnut',data:{labels:ce.map(e=>e[0]),datasets:[{data:ce.map(e=>e[1]),backgroundColor:colors}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10}}}}}});
    const me=Object.entries(a.machines||{}).slice(0,15);
    new Chart(document.getElementById('cMachines'),{type:'bar',data:{labels:me.map(e=>e[0]),datasets:[{data:me.map(e=>e[1]),backgroundColor:me.map((_,i)=>i<3?'#e74c3c':i<6?'#f39c12':'#3498db')}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
    const pVals=me.map(e=>e[1]),sum=pVals.reduce((a,b)=>a+b,0);let cum=0;const cPct=pVals.map(v=>{cum+=v;return cum/sum*100});
    new Chart(document.getElementById('cPareto'),{type:'bar',data:{labels:me.map(e=>e[0]),datasets:[{label:'次数',data:pVals,backgroundColor:'#3498db',yAxisID:'y'},{label:'累计%',data:cPct,type:'line',borderColor:'#e74c3c',yAxisID:'y1',pointRadius:1}]},options:{responsive:true,plugins:{legend:{labels:{font:{size:10}}}}},scales:{y:{},y1:{position:'right',min:0,max:100,ticks:{callback:v=>v+'%'}}}});
  },200);
}

// ===== SETTINGS =====
function renderSettings(){
  const std=DATA.inspection_standards;
  document.getElementById('settingsInsp').innerHTML=Object.entries(std).map(([tname,types])=>`
    <div style="margin-bottom:12px"><h4 style="margin:8px 0">🔧 ${tname}</h4>
    ${Object.entries(types).map(([freq,items])=>`<div style="margin:4px 0 8px 12px"><strong>${freq}</strong>: ${items.map(i=>`${i.item}(${i.standard}${i.unit})`).join(' · ')}</div>`).join('')}</div>`).join('');
}

// ===== MODAL =====
function showModal(type){
  document.getElementById('modalOverlay').style.display='flex';
  const box=document.getElementById('modalBox');
  if(type==='archive')box.innerHTML=`<h3>＋ 新增设备</h3><div class="form-row"><div><label>设备编号</label><input id="mId"></div><div><label>设备名称</label><input id="mName"></div></div><div class="form-row"><div><label>设备类型</label><select id="mType">${Object.keys(DATA.inspection_standards).map(t=>`<option>${t}</option>`).join('')}</select></div><div><label>安装位置</label><input id="mLoc"></div></div><div class="form-row"><div><label>负责人</label><input id="mResp"></div><div><label>状态</label><select id="mStatus"><option>正常运行</option><option>注意</option></select></div></div><div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="addEquipment()">保存</button></div>`;
  if(type==='repair')box.innerHTML=`<h3>📝 新建报修单</h3><div class="form-row"><div><label>设备</label><select id="rMach">${DATA.equipment_archive.map(e=>`<option>${e.name}</option>`).join('')}</select></div><div><label>故障类别</label><select id="rCat"><option>设备装置异常</option><option>工艺条件异常</option><option>软件异常</option><option>耗材消耗</option><option>PM</option><option>其他</option></select></div></div><div class="form-row full"><div><label>故障描述</label><textarea id="rDesc"></textarea></div></div><div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="addRepair()">提交</button></div>`;
  if(type==='pm')box.innerHTML=`<h3>＋ 新建保养计划</h3><div class="form-row"><div><label>设备</label><select id="pmMach">${DATA.equipment_archive.map(e=>`<option>${e.name}</option>`).join('')}</select></div><div><label>周期(天)</label><input id="pmInterval" type="number" value="14"></div></div><div class="form-row"><div><label>负责人</label><select id="pmAssignee"><option>张工</option><option>李工</option><option>王工</option></select></div><div><label>下次日期</label><input id="pmDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div><div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="addPM()">保存</button></div>`;
  if(type==='inbound')box.innerHTML=`<h3>📥 备件入库</h3><div class="form-row"><div><label>备件</label><select id="ibPart">${DATA.spare_parts_inventory.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div><div><label>数量</label><input id="ibQty" type="number" value="1"></div></div><div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doInbound()">确认入库</button></div>`;
  if(type==='outbound')box.innerHTML=`<h3>📤 备件领用</h3><div class="form-row"><div><label>备件</label><select id="obPart">${DATA.spare_parts_inventory.map(s=>`<option value="${s.id}">${s.name}（库存:${s.current}）</option>`).join('')}</select></div><div><label>数量</label><input id="obQty" type="number" value="1"></div></div><div class="form-row full"><div><label>领用人</label><input id="obPerson"></div></div><div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doOutbound()">确认领用</button></div>`;
}
function closeModal(e){if(e&&e.target!==document.getElementById('modalOverlay'))return;document.getElementById('modalOverlay').style.display='none';}
function addEquipment(){
  const eq={id:'EQ-'+document.getElementById('mId')?.value||'',name:document.getElementById('mName')?.value||'',type:document.getElementById('mType')?.value||'',location:document.getElementById('mLoc')?.value||'',status:document.getElementById('mStatus')?.value||'正常运行',responsible:document.getElementById('mResp')?.value||'',qr_code:'EQ-'+document.getElementById('mId')?.value||'',total_events:0,last_event:'-',model:'',serial_no:'',purchase_date:'',dept:'设备部'};
  DATA.equipment_archive.push(eq);closeModal();renderArchive();renderWorkbench();
}
function addRepair(){
  const wo={id:'WO-2024-'+String(DATA.work_orders.length+1).padStart(4,'0'),machine:document.getElementById('rMach')?.value||'',category:document.getElementById('rCat')?.value||'',description:document.getElementById('rDesc')?.value||'',start_time:new Date().toISOString().slice(0,16),reporter:'管理员',dispatcher:'',handler:'',stage:'待派单',duration:'0',solution:''};
  DATA.work_orders.unshift(wo);closeModal();renderRepair();renderWorkbench();
}
function addPM(){
  DATA.pm_plans.push({machine:document.getElementById('pmMach')?.value||'',type:'',interval_days:parseInt(document.getElementById('pmInterval')?.value)||14,last_date:'-',next_date:document.getElementById('pmDate')?.value||'',status:'计划中',assignee:document.getElementById('pmAssignee')?.value||''});
  closeModal();renderPM();renderWorkbench();
}
function doInbound(){
  const sp=DATA.spare_parts_inventory.find(s=>s.id===document.getElementById('ibPart')?.value);
  if(sp){sp.current+=parseInt(document.getElementById('ibQty')?.value)||0;sp.last_inbound=new Date().toISOString().slice(0,10);}
  closeModal();renderSP();renderWorkbench();
}
function doOutbound(){
  const sp=DATA.spare_parts_inventory.find(s=>s.id===document.getElementById('obPart')?.value);
  const qty=parseInt(document.getElementById('obQty')?.value)||0;
  if(sp&&sp.current>=qty){sp.current-=qty;}else{alert('库存不足！');return;}
  closeModal();renderSP();renderWorkbench();
}

// Init
renderWorkbench();
</script>
</body>
</html>
